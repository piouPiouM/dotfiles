"$schema" = 'https://starship.rs/config-schema.json'

format = """
${custom.git_status_simplified}\
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status \
$cmd_duration\
$fill\
$git_metrics\
$git_commit\
$line_break\
$package\
${custom.git_email}\
$jobs\
$character"""

right_format = """
$python"""
# ${custom.command_number}"""

[directory]
read_only = " ’æ¢ "
style = "blue"

[character]
success_symbol = "[ŌØ»](purple)"
error_symbol = "[ŌØ»](red)"
vimcmd_symbol = "[ŌØ«](green)"

[fill]
symbol = ' '

[git_branch]
format = "[$symbol$branch(:[$remote_name/$remote_branch](red))]($style)"
style = "bright-black"
always_show_remote = true
symbol = "’Éś "

[git_commit]
format = '[(’ÉŚ $hash)$tag]($style)'
only_detached = true
tag_disabled = false
tag_symbol = " ’ÉÆ "

[git_status]
format = " ($conflicted)($untracked)($modified)($renamed)($deleted)($staged)[($ahead_behind$stashed)]($style)"
style = "cyan"
stashed= "’ö× "
diverged = 'ŌćĢŌćĪ${ahead_count}ŌćŻ${behind_count}'
up_to_date = " [¾▒ØĆ ](green)"
untracked = "[¾░śź ](bright-black)"
modified = "[¾░ŻĢ ](purple)"
staged = "[¾░┤ś ](bright-green)"
deleted = "[¾░ŹĘ ](red)"
ahead = "[’É▒ ](yellow)"
behind = "[’É│ ](yellow)"
conflicted = "[¾░Ś¢ ](bold red)"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[git_metrics]
disabled = false

[jobs]
format = ' [$symbol$number]($style)'
style = "purple"
symbol = "¾░ŖĀ "

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[nodejs]
format = '[$symbol($version )]($style)'
detect_extensions = ['js', 'jsx', 'mjs', 'cjs', 'ts', 'tsx', 'mts', 'cts']

[package]
format = '[$symbol$version]($style)'
symbol = '’Æć '

[python]
format = "[$virtualenv]($style) "
style = "bright-black"

[custom.command_number]
command = "echo %h"
when = "true"
format = "[$output](yellow)"

[custom.git_email]
format = "Ņ«Ö [$output]($style)"
style = "bright-black"
shell = ["git", "config", "--get"]
command = 'user.email'
use_stdin = false
detect_folders = ['.git']
detect_files = ['.git']