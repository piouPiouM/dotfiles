# Tourmaline Paraiba - A light theme inspired by the Tourmaline Paraiba Gem
# Based on the Tourmaline Paraiba Neovim theme
# Soft pastel colors with excellent readability

# Basic colors
foreground #1A1A1A
background #F5FCFD
selection_foreground #1A1A1A
selection_background #A4D0F5

# Cursor colors
cursor #283940
cursor_text_color #F5FCFD

# URL underline color when hovering with mouse
url_color #489CEF

# Kitty window border colors
active_border_color #489CEF
inactive_border_color #7B8D94
bell_border_color #FFCC33

# OS Window titlebar colors
wayland_titlebar_color #F8FCFF
macos_titlebar_color #F8FCFF

# Tab bar colors
active_tab_foreground #F5FCFD
active_tab_background #489CEF
active_tab_font_style bold
inactive_tab_foreground #283940
inactive_tab_background #DEE6E9
inactive_tab_font_style normal
tab_bar_background #EEF3F4

# Colors for marks (marked text in the terminal)
mark1_foreground #0055A3
mark1_background #E6F4FF
mark2_foreground #245913
mark2_background #F4FADF
mark3_foreground #730085
mark3_background #FDF5FF

# The 16 terminal colors

# black (foreground and gray tones)
color0 #1A1A1A
color8 #485C65

# red (error colors)
color1 #CC4444
color9 #FF6666

# green (success/string colors)
color2 #66BB33
color10 #66BB33

# yellow (warning/comment colors)
color3 #FFCC33
color11 #FFD44D

# blue (info/function colors)
color4 #489CEF
color12 #66B3FF

# magenta (builtin/special colors)
color5 #CC33FF
color13 #D966FF

# cyan (constant/orange colors)
color6 #FF9933
color14 #FFB366

# white (background and light tones)
color7 #DEE6E9
color15 #F5FCFD

# Extended colors for better syntax highlighting
# Additional colors (color16-color255) provide better gradients for 256-color applications

# Oranges (constants, declarations)
color16 #FFB366
color17 #FFA64D

# Darker reds (types, errors)
color52 #CC4444
color88 #E65252

# Light backgrounds for highlights
color230 #FFED99
color231 #DEE6E9
color254 #CFE8FF
color255 #DBEBC8

# Grays for UI elements (teal-tinted, progressive darkening)
color234 #1D2C33
color235 #283940
color236 #364950
color237 #485C65
color250 #A3B1B8
color251 #C8D3D7

# Pastel backgrounds (syntax highlighting)
color189 #B8DCFF
color194 #E3F2C8
color224 #FFED99
color217 #FFEBEB
color225 #E8C4FF
color223 #FFF0DB
color183 #D4B3FF

# Additional accent colors
color214 #E69500
color167 #991111
color033 #0055A3
color070 #245913
color127 #730085
color166 #A33D00
color092 #4D2185
color161 #991A3F

